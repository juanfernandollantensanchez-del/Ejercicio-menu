<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculos CodeRider</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f4f7f6; }
        .container, .test-group { 
            max-width: 600px; 
            margin: 0 auto 20px; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        h1, h3 { color: #2c3e50; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { 
            width: 100%; padding: 12px; border: none; border-radius: 5px; 
            cursor: pointer; font-weight: bold; transition: 0.3s; margin-bottom: 10px;
        }
        #btncalcular { background-color: #3498db; color: white; }
        #btncalcular:hover { background-color: #2980b9; }
        #btnTest { background-color: #9b59b6; color: white; }
        #btnTest:hover { background-color: #8e44ad; }
        
        #resultados, #test-status { 
            margin-top: 15px; padding: 15px; border-radius: 5px; 
            background: #f9f9f9; min-height: 20px; border-left: 5px solid #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cálculos CodeRider</h1>
        <div class="input-group">
            <label for="numero1">Número 1 (Límite Primos):</label>
            <input type="number" id="numero1" value="10">
        </div>
        <div class="input-group">
            <label for="numero2">Número 2 (Merge Array 2):</label>
            <input type="number" id="numero2" value="5">
        </div>
        <div class="input-group">
            <label for="inputGeneral">Input General (Arrays/Matrices):</label>
            <input type="text" id="inputGeneral" value="1 2 3 4 5">
        </div>
        <div class="input-group">
            <label for="operacion">Selecciona Operación:</label>
            <select id="operacion">
                <option value="ex26">Ejercicio 26 (Suma Subarreglo)</option> 
                <option value="ex27">Ejercicio 27 (Merge Lists)</option>
                <option value="ex28" selected>Ejercicio 28 (Números Primos)</option>
                <option value="ex29">Ejercicio 29 (Transponer Matriz)</option>
                <option value="ex30">Ejercicio 30 (Merge Sort)</option>
                <option value="nombre">👤 Mostrar Autor</option>
            </select>
        </div>
        <button id="btncalcular">Calcular 🚀</button>
        <div id="resultados">Esperando acción...</div>
    </div>

    <div class="test-group">
        <h3>Panel de Testing</h3>
        <button id="btnTest">Ejecutar Testing del Ejercicio Seleccionado</button>
        <div id="test-status">Estado del Test: Esperando...</div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
