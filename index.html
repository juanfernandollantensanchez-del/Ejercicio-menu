<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculos CodeRider</title>
</head>
<body>
    <div class="container">
        <h1>Cálculos CodeRider</h1>

        <div class="input-group">
            <label for="numero1">Número 1:</label>
            <input type="number" id="numero1" value="10">
        </div>
        <div class="input-group">
            <label for="numero2">Número 2:</label>
            <input type="number" id="numero2" value="5">
        </div>

        <!-- Este campo es necesario para ejercicios de listas de números -->
        <div class="input-group">
            <label for="inputGeneral">Input para Arrays (espaciado):</label>
            <input type="text" id="inputGeneral" value="1 2 3 4 5">
        </div>

        <div class="input-group">
            <label for="operacion">Operación:</label>
            <select id="operacion">
                <option value="ex26">Ejercicio 26</option> 
                <option value="ex27">Ejercicio 27</option>
                <option value="ex28">Ejercicio 28</option>
                <option value="ex29">Ejercicio 29</option>
                <option value="ex30">Ejercicio 30</option>
            </select>
        </div>

        <button id="btncalcular">Calcular 🚀</button>

        <div id="resultados">
            El resultado aparecerá aquí...
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
